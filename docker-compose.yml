services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      DATABASE_URL: postgresql+psycopg2://cyberarena:${POSTGRES_PASSWORD:-cyberarena}@db:5432/cyberarena
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cyberarena
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cyberarena}
      POSTGRES_DB: cyberarena
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberarena -d cyberarena"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
